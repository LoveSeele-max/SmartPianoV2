<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Piano V2 - DAW UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/soundfont-player@0.12.0/dist/soundfont-player.min.js"></script>
    <script type="module" src="app.js"></script>
    <style>
        :root {
            --app-bg: #18181b;
            --panel-bg: #27272a;
            --panel-border: #3f3f46;
            --accent: #22d3ee;
            --accent-dark: #06b6d4;
        }

        * { box-sizing: border-box; }
        body {
            background: radial-gradient(circle at top, rgba(34, 211, 238, 0.08), transparent 34%), var(--app-bg);
            color: #e4e4e7;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .glass-panel {
            background: linear-gradient(180deg, rgba(39, 39, 42, 0.96), rgba(24, 24, 27, 0.94));
            border: 1px solid var(--panel-border);
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.32), inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        .control-shell {
            background: #18181b;
            border: 1px solid #3f3f46;
            border-radius: 0.75rem;
            color: #d4d4d8;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }
        .control-shell:focus, .control-shell:focus-visible, input:focus, select:focus {
            outline: none;
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.22), 0 0 18px rgba(34, 211, 238, 0.14);
        }

        .midi-status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; }
        .midi-connected { background-color: #4ade80; box-shadow: 0 0 12px #4ade80; }
        .midi-disconnected { background-color: #52525b; box-shadow: 0 0 0 transparent; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .parse-progress { transition: width 0.3s ease; }

        input[type=range] { accent-color: var(--accent); }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            margin-top: -4px;
            box-shadow: 0 0 14px rgba(34, 211, 238, 0.8);
        }
        input[type=range]::-webkit-slider-runnable-track {
            height: 8px;
            background: #3f3f46;
            border-radius: 999px;
        }

        #sheet-canvas {
            cursor: pointer;
            touch-action: none;
        }

        .key-white {
            background: linear-gradient(180deg, #f8fafc 0%, #cbd5e1 100%);
            color: #64748b;
            border: 1px solid #94a3b8;
            border-top: none;
            border-radius: 0 0 7px 7px;
            box-shadow: inset 0 -8px 16px rgba(15, 23, 42, 0.12), 0 6px 10px rgba(0, 0, 0, 0.24);
            transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.08s ease;
            touch-action: none;
        }
        .key-black {
            background: linear-gradient(180deg, #27272a 0%, #020617 100%);
            color: #a1a1aa;
            border: 1px solid #000;
            border-top: none;
            border-radius: 0 0 6px 6px;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5), inset 0 -8px 14px rgba(0, 0, 0, 0.48);
            transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.08s ease;
            touch-action: none;
        }
        .key-label {
            font-family: Inter, ui-sans-serif, system-ui, sans-serif;
            letter-spacing: 0.02em;
            opacity: 0.68;
        }
        .key-pressed.key-white {
            background: #a5f3fc !important;
            box-shadow: 0 0 20px #22d3ee, inset 0 0 10px #06b6d4 !important;
            border-color: #06b6d4 !important;
            color: #164e63 !important;
            transform: translateY(2px);
            transition: none !important;
        }
        .key-pressed.key-black {
            background: linear-gradient(180deg, #0891b2 0%, #083344 100%) !important;
            box-shadow: 0 0 20px #22d3ee, inset 0 0 12px #67e8f9, 2px 2px 5px rgba(0, 0, 0, 0.55) !important;
            border-color: #22d3ee !important;
            color: #ecfeff !important;
            transform: translateY(2px) scale(0.98);
            transition: none !important;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden select-none">

    <header class="z-20 shrink-0 border-b border-zinc-800/90 bg-zinc-900/95 p-2 shadow-[0_16px_40px_rgba(0,0,0,0.35)] lg:p-3">
        <div class="mx-auto grid w-full max-w-[1600px] grid-cols-1 gap-3 lg:grid-cols-12">
            <section class="glass-panel rounded-2xl p-3 lg:col-span-3">
                <div class="mb-3 flex items-center justify-between gap-3">
                    <div>
                        <p class="text-[11px] uppercase tracking-[0.28em] text-cyan-400">Smart Piano V2</p>
                        <h1 class="mt-1 text-lg font-black tracking-tight text-zinc-50">现代钢琴练习工作站</h1>
                    </div>
                    <div class="rounded-xl border border-cyan-400/30 bg-cyan-400/10 px-3 py-2 text-cyan-300 shadow-[0_0_20px_rgba(34,211,238,0.12)]">88</div>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div class="col-span-2 rounded-xl border border-zinc-700 bg-zinc-950/60 p-3">
                        <label class="mb-2 block text-[10px] font-semibold uppercase tracking-[0.2em] text-zinc-500">MIDI Device</label>
                        <div class="flex items-center gap-2 text-sm text-zinc-300">
                            <span id="midi-dot" class="midi-status-dot midi-disconnected shrink-0"></span>
                            <span id="midi-status-text" class="truncate">初始化中...</span>
                        </div>
                    </div>

                    <div class="col-span-2 flex bg-zinc-950 rounded-xl p-1 relative border border-zinc-700">
                        <button id="mode-auto" class="px-4 py-2 rounded-lg text-sm font-semibold transition-all duration-300 z-10 w-1/2 text-white">自动播放</button>
                        <button id="mode-wait" class="px-4 py-2 rounded-lg text-sm font-semibold transition-all duration-300 z-10 w-1/2 text-slate-400">练习模式</button>
                        <div id="mode-slider" class="absolute top-1 left-1 w-[calc(50%-4px)] h-[calc(100%-8px)] bg-cyan-600 rounded-lg shadow-[0_0_18px_rgba(34,211,238,0.45)] transition-all duration-300"></div>
                    </div>

                    <label class="rounded-xl border border-zinc-700 bg-zinc-950/60 p-3">
                        <span class="mb-1 block text-[10px] font-semibold uppercase tracking-[0.2em] text-zinc-500">BPM</span>
                        <input type="number" id="bpm-ui" class="control-shell w-full bg-zinc-900 px-3 py-2 text-center font-mono text-lg font-black text-cyan-300" value="100" min="10" max="300" title="调整播放速度">
                    </label>
                                        <label class="rounded-xl border border-zinc-700 bg-zinc-950/60 p-3">
                        <span class="mb-2 block text-[10px] font-semibold uppercase tracking-[0.2em] text-zinc-500">音量</span>
                        <input type="range" id="volume-slider" min="0" max="10" step="0.1" value="8" class="w-full">
                    </label>
                </div>
            </section>

                        <section class="glass-panel flex flex-col gap-3 rounded-2xl p-3 lg:col-span-2">
                <label class="flex min-h-[112px] flex-1 cursor-pointer flex-col items-center justify-center rounded-xl border-2 border-dashed border-zinc-600 bg-zinc-800/80 p-3 text-center text-zinc-400 transition-all hover:border-cyan-400 hover:bg-zinc-700/80 hover:text-cyan-300 hover:shadow-[0_0_24px_rgba(34,211,238,0.18)]" title="支持 MusicXML(.xml/.mxl)、MIDI(.mid/.midi)、JSON 曲谱文件">
                    <span class="mb-3 flex h-12 w-12 items-center justify-center rounded-2xl border border-zinc-600 bg-zinc-950 text-2xl text-cyan-300 shadow-inner">+</span>
                    <span class="text-base font-black">传曲谱</span>
                    <span class="mt-1 text-xs text-zinc-500">XML / MXL / MIDI / JSON</span>
                    <input type="file" id="upload-sheet" class="hidden" accept=".xml,.mxl,.mid,.midi,.json">
                </label>
                <div class="grid grid-cols-2 gap-2">
                    <button id="btn-play-pause" class="rounded-xl border border-cyan-400/30 bg-zinc-900 px-4 py-3 text-sm font-black text-cyan-300 shadow-[0_0_18px_rgba(34,211,238,0.14)] transition-all hover:border-cyan-300 hover:bg-cyan-400/10 hover:text-cyan-100">播放</button>
                    <button id="btn-reset" class="rounded-xl border border-zinc-600 bg-zinc-800 px-4 py-3 text-sm font-black text-zinc-200 transition-all hover:border-cyan-400 hover:text-cyan-300 hover:shadow-[0_0_18px_rgba(34,211,238,0.16)]">重置</button>
                </div>
            </section>

            <section class="glass-panel rounded-2xl p-3 lg:col-span-7">
                <div class="mb-3 flex items-center justify-between gap-3">
                    <div>
                        <p class="text-[11px] uppercase tracking-[0.28em] text-zinc-500">Sheet Library</p>
                        <h2 class="text-lg font-black text-zinc-50">本地曲谱库</h2>
                    </div>
                    <span id="playlist-count" class="rounded-full border border-zinc-700 bg-zinc-950 px-3 py-1 text-xs text-zinc-400">加载中</span>
                </div>
                <div class="max-h-[138px] overflow-auto rounded-xl border border-zinc-700 bg-zinc-950/45 no-scrollbar">
                    <table class="w-full text-left text-xs">
                        <thead class="sticky top-0 z-10 border-b border-zinc-700 bg-zinc-900/95 text-[10px] uppercase tracking-[0.18em] text-zinc-500 backdrop-blur">
                            <tr>
                                <th class="px-3 py-2 font-bold">ID</th>
                                <th class="px-3 py-2 font-bold">Title</th>
                                <th class="px-3 py-2 font-bold">Type</th>
                                <th class="px-3 py-2 font-bold">Status</th>
                                <th class="px-3 py-2 text-right font-bold">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="playlist-container" class="divide-y divide-zinc-800">
                            <tr><td colspan="5" class="px-3 py-8 text-center text-zinc-500">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </header>

    <main class="flex-1 min-h-0 overflow-hidden bg-zinc-900 p-2 lg:p-4">
        <section class="glass-panel mx-auto flex h-full max-w-[1600px] flex-col overflow-hidden rounded-3xl">
            <div class="flex shrink-0 flex-wrap items-center justify-between gap-3 border-b border-zinc-800 bg-zinc-950/55 px-4 py-2 lg:py-3">
                <div class="min-w-0">
                    <p class="text-[10px] font-bold uppercase tracking-[0.24em] text-cyan-400">Score View / Piano Roll</p>
                    <div class="mt-1 truncate text-sm text-zinc-400">
                        当前曲目: <span id="current-song-name" class="font-bold text-cyan-300">《小星星》</span>
                        <span class="mx-2 text-zinc-700">/</span>
                        <span id="instruction-text">内置《小星星》示例曲谱。上传文件开始练习。</span>
                    </div>
                </div>
                <div class="flex min-w-[280px] flex-1 items-center gap-3 lg:max-w-[680px]">
                    <button id="btn-skip-backward" class="shrink-0 rounded-lg border border-zinc-700 bg-zinc-900 px-3 py-2 text-xs font-bold text-zinc-300 transition hover:border-cyan-400 hover:text-cyan-300" title="-1小节(按4拍算)">-4拍</button>
                    <input type="range" id="progress-slider" class="w-full cursor-pointer appearance-none rounded-lg bg-zinc-700" min="0" max="100" value="0" step="0.1">
                    <button id="btn-skip-forward" class="shrink-0 rounded-lg border border-zinc-700 bg-zinc-900 px-3 py-2 text-xs font-bold text-zinc-300 transition hover:border-cyan-400 hover:text-cyan-300" title="+1小节(按4拍算)">+4拍</button>
                </div>
            </div>

                        <div class="relative flex-1 min-h-0 p-2 lg:p-4">
                <div id="sheet-container" class="relative h-full min-h-0 w-full overflow-hidden rounded-2xl border border-cyan-400/20 bg-zinc-950 shadow-[inset_0_0_70px_rgba(0,0,0,0.58),0_0_34px_rgba(34,211,238,0.08)]"></div>
            </div>
        </section>
    </main>

    <footer class="h-32 shrink-0 border-t-4 border-zinc-950 bg-zinc-800 p-2 overflow-x-auto shadow-[0_-16px_34px_rgba(0,0,0,0.42)] lg:h-36">
        <div class="flex h-full min-w-max mx-auto justify-center relative" id="virtual-keyboard"></div>
    </footer>

    <div id="parse-modal" class="fixed inset-0 bg-black/80 z-50 hidden flex-col items-center justify-center backdrop-blur-sm">
        <h2 class="text-xl font-bold text-white mb-4" id="parse-modal-title">正在解析曲谱...</h2>
        <div class="w-72 bg-zinc-800 rounded-full h-3 overflow-hidden border border-zinc-600 shadow-inner">
            <div id="parse-progress-bar" class="parse-progress h-full bg-gradient-to-r from-cyan-400 to-emerald-400 rounded-full shadow-[0_0_18px_rgba(34,211,238,0.45)]" style="width: 0%"></div>
        </div>
        <p class="text-zinc-400 mt-4 text-sm" id="parse-modal-detail">读取文件中...</p>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then((registration) => {
                        console.log('[SW] ServiceWorker 注册成功:', registration.scope);
                    })
                    .catch((error) => {
                        console.warn('[SW] ServiceWorker 注册失败:', error);
                    });
            });
        }
    </script>
</body>
</html>
